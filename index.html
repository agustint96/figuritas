<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Figuritas - Encontrá las parejas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Oxanium:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/typed.js@2.1.0/dist/typed.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tone@14.7.77/build/Tone.js"></script>
  </head>
  <body>
    <header class="game-header">
      <div class="header-title">
        <h1 id="game-title">Figuritas - Encontrá las parejas</h1>
      </div>
      <div class="header-stats">
        <div class="stat">Intentos: <span id="tries">0</span></div>
        <div class="stat">Parejas: <span id="pairs">0</span> / 9</div>
        <button id="btn-restart" onclick="initGame()">Nueva partida</button>
        <button id="btn-ranking" onclick="showRanking()">🏆 Ranking</button>
      </div>
    </header>

    <div id="grid"></div>
    <div id="match-footer"></div>

    <!-- Modal de victoria + guardar score -->
    <div id="win-overlay" style="display: none">
      <div id="win-modal">
        <button
          onclick="closeWinModal()"
          id="btn-win-close"
          style="
            position: absolute;
            top: 14px;
            right: 16px;
            background: transparent;
            border: none;
            font-size: 1.4rem;
            cursor: pointer;
            line-height: 1;
            padding: 0;
          "
          aria-label="Cerrar"
        >
          &#x2715;
        </button>
        <div id="win-title">¡Ganaste! 🎉</div>
        <p id="win-score-text"></p>
        <input
          id="player-name"
          type="text"
          maxlength="20"
          placeholder="Tu nombre o apodo"
          autocomplete="off"
        />
        <button id="btn-save-score" onclick="saveScore()">
          Guardar puntaje
        </button>
        <button id="btn-skip" onclick="closeWinModal()">Jugar de nuevo</button>
        <div id="save-feedback"></div>
      </div>
    </div>

    <!-- Modal de ranking -->
    <div id="ranking-overlay" style="display: none">
      <div id="ranking-modal">
        <h2>🏆 Mejores puntajes</h2>
        <div id="ranking-list">Cargando...</div>
        <button onclick="closeRanking()">Cerrar</button>
      </div>
    </div>

    <script src="game.js"></script>
  </body>
</html>
